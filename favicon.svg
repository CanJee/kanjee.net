<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9b59ff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#090d12"/>

  <!-- Gradient border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="4.5"
        fill="none" stroke="url(#border-grad)" stroke-width="1.2"/>

  <!-- K shape with cyan glow -->
  <g filter="url(#glow)">
    <line x1="9"  y1="6"    x2="9"  y2="26"   stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="9"  y1="16.5" x2="22" y2="6.5"  stroke="#00e5ff" stroke-width="3"   stroke-linecap="round"/>
    <line x1="9"  y1="16.5" x2="22" y2="25.5" stroke="#00e5ff" stroke-width="3"   stroke-linecap="round"/>
  </g>

  <!-- Orange accent dot (top-right, matching site's orange·dot motif) -->
  <circle cx="25.5" cy="7.5" r="3.2" fill="#ff6b35"/>
</svg>
